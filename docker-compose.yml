services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: parksight
      POSTGRES_USER: parksight
      POSTGRES_PASSWORD: parksight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/02_sample_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parksight -d parksight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://parksight:parksight@db:5432/parksight
      BACKEND_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
